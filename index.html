<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic"
        rel="stylesheet" />
    <link rel="stylesheet" href="./style.css">
    <title>Quiz game</title>
</head>

<body>

    <div class="container">

        <div class="screen active" id="start-screen">
            <h1>Quiz Time!</h1>
            <p>Test your knowledge with these fun questions</p>
            <button id="start-btn">Start Quiz</button>
        </div>

        <div class="screen " id="quiz-screen">

            <div id="quiz-header">
                <h2 id="question-quiz">Questions goes here</h2>
                <div class="quiz-info">
                    <p>Question <span id="current-question">1</span>of <span>5</span></p>
                    <p>Score: <span id="score">0</span></p>
                </div>
            </div>

            <div id="answers-container" class="answer-container">
                <!-- Answer buttons will be inserted from our js code later at some point -->
            </div>

            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>


        </div>

        <div id="result-screen" class="screen ">
            <h1>Quiz Results</h1>
            <div class="result-info">
                <p>You scored <span id="final-score">0</span>out of <span id="max-score">5</span></p>
                <div id="result-message">Good Job!</div>
            </div>
            <button id="restart-btn">Restart button</button>
        </div>

    </div>

    <script src="./script.js"></script>
</body>

</html>
